name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: Typecheck and unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci
      - name: Run typecheck
        run: npm run typecheck
      - name: Run unit tests with coverage
        run: |
          node --test --experimental-test-coverage --test-reporter=spec 'test/*.test.ts' \
            2> >(tee test-stderr.log >&2) | tee test-stdout.log
      - name: Publish coverage to job summary
        if: always()
        shell: bash
        run: |
          if [ -f test-stdout.log ]; then
            {
              echo '### Test coverage'
              echo ''
              echo '```'
              awk '/^# (start of coverage|---+|file\s)/,/^# end of coverage/' test-stdout.log || true
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  test-from-project:
    name: Resolve from build.zig.zon
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with: { fetch-depth: 0 }
      - name: Create build.zig.zon fixture
        run: |
          cat >build.zig.zon <<'EOF'
          .{
              .name = "test-project",
              .version = "0.0.0",
              .minimum_zig_version = "0.13.0",
              .paths = .{""},
              .fingerprint = 0x43eaf07faceda5c3,
          }
          EOF
      - name: Set up Zig
        id: setup
        uses: ./
      - name: Verify zig-version output
        env:
          OUTPUT_VERSION: ${{ steps.setup.outputs.zig-version }}
        run: |
          if [ "$OUTPUT_VERSION" != "0.13.0" ]; then
            echo "zig-version output mismatch: expected 0.13.0, got '$OUTPUT_VERSION'"
            exit 1
          fi
      - name: Check installed Zig version
        run: |
          if [ "$(zig version)" != '0.13.0' ]; then
            echo "version mismatch: expected '0.13.0', got '$(zig version)'"
            exit 1
          fi

  test-version-file:
    name: Resolve from zig-version-file
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Create .zigversion fixture
        run: echo '0.13.0' > .zigversion
      - name: Set up Zig
        uses: ./
        with:
          zig-version-file: .zigversion
      - name: Check installed Zig version
        run: |
          if [ "$(zig version)" != '0.13.0' ]; then
            echo "version mismatch: expected '0.13.0', got '$(zig version)'"
            exit 1
          fi

  test:
    name: smoke test (${{ matrix.os }}, ${{ matrix.zig_version }})
    needs: check
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        zig_version:
          - 'master'
          - 'latest'
          - '2024.5.0-mach'
          - '0.14.0'
          - '0.14.1'  # zig-linux-x86_64 -> zig-x86_64-linux
          - '0.15.0'
          - '0.15.1'  # armv7a -> arm
    steps:
      - name: Harden runner
        if: runner.os == 'Linux'
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with: { fetch-depth: 0 }
      - name: Set up Zig
        uses: ./
        with: { version: '${{ matrix.zig_version }}' }
      - name: Smoke-test the installed Zig
        shell: bash
        run: |
          # Verify Zig is on PATH, reports a version, and can compile + run
          # a tiny self-contained test program. We do NOT rely on
          # `zig init`'s template here — that template has occasionally
          # shipped broken across releases (e.g. 0.16.0's `init` parameter
          # shadowing), and a template bug would falsely fail this matrix.
          zig version
          cat >smoke.zig <<'EOF'
          const std = @import("std");
          test "two plus two" {
              try std.testing.expect(2 + 2 == 4);
          }
          EOF
          zig test smoke.zig
