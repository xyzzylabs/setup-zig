name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      major: ${{ steps.release.outputs.major }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # Use a PAT so the Release PR is created by the token owner
          # rather than `github-actions[bot]`. The default GITHUB_TOKEN
          # cannot create PRs when the org policy disables it.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  update-major-tag:
    name: Advance floating major tag
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          # Use the same PAT as release-please so the tag push is
          # authenticated and attributed consistently with the release.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
      - name: Move floating major tag
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
          MAJOR: v${{ needs.release-please.outputs.major }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Re-point the floating major tag at the just-tagged release.
          git tag -f "$MAJOR" "$TAG"
          git push --force origin "refs/tags/$MAJOR"
