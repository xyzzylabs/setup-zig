name: pr-title

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read

jobs:
  semantic:
    name: Semantic PR title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      statuses: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - name: Lint PR title against Conventional Commits
        uses: amannn/action-semantic-pull-request@e32d7e603df1aa1ba07e981f2a23455dee596825 # v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            docs
            deps
            build
            ci
            test
            chore
          requireScope: false
          subjectPattern: ^[a-z].+$
          subjectPatternError: |
            The PR title subject should start with a lower-case letter, e.g.
            "feat: add Mach version resolver" — not "feat: Add Mach version resolver".
